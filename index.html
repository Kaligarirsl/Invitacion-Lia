<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Lia</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#ff00cc,#3333ff,#00ffee);
    background-size:400% 400%;
    animation:fondo 10s infinite alternate;
    color:white;
    text-align:center;
}

@keyframes fondo{
    0%{background-position:0%}
    100%{background-position:100%}
}

.card{

    margin:40px auto;
    max-width:500px;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px #ff00ff;

}

h1{
    font-size:40px;
    color:#ff66ff;
}

h2{
    color:#00ffff;
}

.kpop{
    font-size:22px;
    color:#ffcc00;
    margin-bottom:20px;
}

button{

    padding:12px 20px;
    border:none;
    border-radius:10px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
    background:#ff00ff;
    color:white;
    box-shadow:0 0 10px #ff00ff;
}

button:hover{
    background:#00ffff;
    box-shadow:0 0 20px #00ffff;
}

.confirmado{

    margin-top:20px;
    font-size:20px;
    color:#00ff99;

}

footer{

    margin-top:20px;
    font-size:14px;
    opacity:0.7;

}

</style>

</head>
<body>

<div class="card">

<h1>🎂 Lia cumple años 🎂</h1>

<div class="kpop">
⚔️ Fiesta temática Guerreras K-POP ⚔️
</div>

<h2>Lia Castillo Méndez</h2>

<p>
📅 24 de mayo 2026<br>
⏰ 4:00 PM
</p>

<button onclick="confirmar()">
Confirmar asistencia
</button>

<button onclick="agendar()">
Agregar al calendario
</button>

<div id="msg" class="confirmado"></div>

<footer>
Prepárate para una fiesta K-pop llena de música, baile y energía idol 💜
</footer>

</div>

<script>

function confirmar(){

    document.getElementById("msg").innerHTML =
    "✅ Asistencia confirmada 💜";

}



function agendar(){

    const titulo = "Cumpleaños de Lia";
    const descripcion = "Fiesta temática Guerreras K-pop";
    const lugar = "Casa de Lia";
    const inicio = "20260524T160000";
    const fin = "20260524T190000";

    const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${titulo}
DESCRIPTION:${descripcion}
LOCATION:${lugar}
DTSTART:${inicio}
DTEND:${fin}
END:VEVENT
END:VCALENDAR`;

    const blob = new Blob([ics], { type: 'text/calendar' });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = "recordatorio.ics";
    a.click();

}

</script>

</body>
</html>
