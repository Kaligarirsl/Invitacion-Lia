<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Lia</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:black;
color:white;
text-align:center;

min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
}

/* pantalla inicio */

#inicio{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(45deg,#ff00cc,#3300ff,#00ffee);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;

}

#inicio button{

padding:20px;
font-size:22px;
border:none;
border-radius:10px;
background:#ff00ff;
color:white;
box-shadow:0 0 20px #ff00ff;
cursor:pointer;

}


/* fondo animado */

body.fondo{

background: linear-gradient(135deg,#ff00cc,#3333ff,#00ffee);
background-size:400% 400%;
animation:fondo 8s infinite alternate;

}

@keyframes fondo{

0%{background-position:0%}
100%{background-position:100%}

}


/* tarjeta */

.card{

margin:20px auto;
max-width:500px;
width:90%;

background:rgba(0,0,0,0.6);
padding:20px;
border-radius:20px;
box-shadow:0 0 30px #ff00ff;

}

h1{

font-size:40px;
color:#ff66ff;
text-shadow:0 0 20px #ff00ff;

}

h2{

color:#00ffff;
text-shadow:0 0 10px #00ffff;

}

.kpop{

font-size:22px;
color:#ffcc00;

}

button{

padding:12px 20px;
border:none;
border-radius:10px;
margin:10px;
font-size:16px;
cursor:pointer;
background:#ff00ff;
color:white;
box-shadow:0 0 15px #ff00ff;

}

button:hover{

background:#00ffff;
box-shadow:0 0 25px #00ffff;

}

.confirmado{

margin-top:20px;
font-size:20px;
color:#00ff99;

}


/* partículas */

.particula{

position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:caer linear infinite;
pointer-events:none;

}

@keyframes caer{

0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}

}

.nombre{

font-size:32px;
font-weight:bold;

animation:colorKpop 3s infinite;

text-shadow:
0 0 5px #fff,
0 0 10px #ff00ff,
0 0 20px #00ffff,
0 0 30px #ff00ff;

}


@keyframes colorKpop{

0%{

color:#ff00ff;
text-shadow:0 0 10px #ff00ff,0 0 20px #ff00ff;

}

25%{

color:#00ffff;
text-shadow:0 0 10px #00ffff,0 0 20px #00ffff;

}

50%{

color:#ffff00;
text-shadow:0 0 10px #ffff00,0 0 20px #ffff00;

}

75%{

color:#ff6600;
text-shadow:0 0 10px #ff6600,0 0 20px #ff6600;

}

100%{

color:#ff00ff;
text-shadow:0 0 10px #ff00ff,0 0 20px #ff00ff;

}

}
.imagen-fiesta{

margin:15px auto;
width:200px;
height:200px;

border-radius:15px;
overflow:hidden;

border:4px solid #ff00ff;

box-shadow:
0 0 10px #ff00ff,
0 0 20px #00ffff,
0 0 30px #ff00ff;

animation:brilloImg 3s infinite;

}

.imagen-fiesta video{

width:100%;
height:100%;
object-fit:cover;

}

@keyframes brilloImg{

0%{box-shadow:0 0 10px #ff00ff,0 0 20px #ff00ff;}
50%{box-shadow:0 0 10px #00ffff,0 0 25px #00ffff;}
100%{box-shadow:0 0 10px #ff00ff,0 0 20px #ff00ff;}

}
@media (max-width:600px){

h1{
font-size:28px;
}

.nombre{
font-size:24px;
}

button{
font-size:18px;
padding:14px;
width:80%;
}

}

.whatsapp{
margin-top:10px;
font-size:18px;
color:#00ffcc;
text-shadow:
0 0 5px #00ffcc,
0 0 10px #00ffcc,
0 0 20px #00ffff;
animation:brilloW 2s infinite;
}
</style>

</head>
<body>

<div id="inicio">

<h1>⚔️ Invitación K-POP ⚔️</h1>

<button onclick="entrar()">
Entrar a la fiesta
</button>

</div>



<div id="contenido" style="display:none; min-height:100vh;">
<div class="card">

<h1>🎂 CUMPLEAÑOS 10 🎂</h1>

<div class="kpop">
⚔️ Guerreras K-POP ⚔️
</div>

<h2 class="nombre">Lia Castillo Méndez</h2>

<div class="imagen-fiesta">

<video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

</div>
<p>

📅 24 de mayo 2026<br>
⏰ 4:00 PM

</p>

<button onclick="verMapa()">
Ver ubicación
</button>
<p class="whatsapp">
Confirmar asistencia por WhatsApp al número 55 1234 5678
</p>
<div id="msg" class="confirmado"></div>

</div>

</div>



<audio id="audio" loop>
<source src="sonido.mp3" type="audio/mpeg">
</audio>



<script>


function entrar(){

document.getElementById("inicio").style.display="none";

document.getElementById("contenido").style.display="block";

document.body.classList.add("fondo");

document.getElementById("audio").play();

crearParticulas();

}


function verMapa(){

window.open(
"https://maps.app.goo.gl/TDEynt9cssW5kAb97",
"_blank"
);

}

function crearParticulas(){

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particula";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(p);

}

}



</script>

</body>
</html>
